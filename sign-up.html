<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprout — Sign In</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="sprout-logo.png">
    <meta name="theme-color" content="#052e16">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>

    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background: linear-gradient(160deg, #052e16 0%, #14532d 60%, #166534 100%);
            min-height: 100dvh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 20px;
        }
        .card {
            background: white; border-radius: 28px;
            padding: 44px 36px 36px; width: 100%; max-width: 400px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.28);
        }
        .logo-row { display:flex; align-items:center; gap:10px; margin-bottom:36px; }
        .logo-icon {
            width:44px; height:44px;
            background: linear-gradient(145deg,#22c55e,#15803d);
            border-radius:13px; display:flex; align-items:center; justify-content:center;
            box-shadow: 0 4px 12px rgba(22,163,74,0.4);
        }
        .logo-name { font-size:22px; font-weight:800; color:#052e16; }
        h1 { font-size:27px; font-weight:800; color:#052e16; letter-spacing:-0.7px; margin-bottom:8px; }
        .sub { font-size:14px; color:#6b7280; margin-bottom:32px; line-height:1.5; }

        /* Google button */
        .btn-google {
            width:100%; padding:15px 20px;
            display:flex; align-items:center; justify-content:center; gap:12px;
            background:white; color:#1f2937;
            border:1.5px solid #e5e7eb; border-radius:14px;
            font-size:15px; font-weight:700; cursor:pointer;
            font-family:inherit; transition:all 0.15s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            margin-bottom:20px;
        }
        .btn-google:hover { background:#f9fafb; border-color:#d1d5db; box-shadow:0 4px 16px rgba(0,0,0,0.12); }
        .btn-google:active { transform:scale(0.97); }
        .btn-google svg { flex-shrink:0; }

        /* Divider */
        .divider { display:flex; align-items:center; gap:12px; margin-bottom:20px; color:#9ca3af; font-size:12px; font-weight:600; }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background:#e5e7eb; }

        /* Legacy form */
        label { display:block; font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; color:#166534; margin-bottom:6px; }
        input[type="text"], input[type="email"] {
            width:100%; padding:13px 16px;
            border:1.5px solid #bbf7d0; border-radius:12px;
            font-size:15px; font-family:inherit; color:#052e16; background:#f0fdf4;
            outline:none; transition:all 0.15s;
        }
        input:focus { border-color:#16a34a; background:white; box-shadow:0 0 0 3px rgba(22,163,74,0.14); }
        .field-wrap { margin-bottom:16px; }
        .err { font-size:12px; color:#ef4444; font-weight:500; margin-top:3px; display:none; }
        .btn-start {
            width:100%; padding:15px;
            background:linear-gradient(135deg,#16a34a,#0d9488);
            color:white; border:none; border-radius:14px;
            font-size:15px; font-weight:800; cursor:pointer;
            font-family:inherit; box-shadow:0 6px 20px rgba(22,163,74,0.35);
            margin-bottom:20px; transition:opacity 0.15s,transform 0.1s;
        }
        .btn-start:hover { opacity:0.93; }
        .btn-start:active { transform:scale(0.97); }
        .footer-link { text-align:center; font-size:13px; color:#6b7280; }
        .footer-link a { color:#16a34a; font-weight:700; text-decoration:none; }
        .err-msg { background:#fef2f2; border:1px solid #fecaca; border-radius:10px; padding:10px 14px; font-size:13px; color:#ef4444; margin-bottom:16px; display:none; }
        .privacy { text-align:center; font-size:11px; color:#9ca3af; margin-top:16px; line-height:1.6; }

        @media(max-width:440px) { .card { padding:32px 22px 28px; border-radius:24px; } h1 { font-size:24px; } }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-row">
            <div class="logo-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
                    <path d="M 2.5 12 C 6 1 18 1 22 9 L 20.5 10.5 C 17 3.5 7 3.5 4 13 Z"/>
                    <path d="M 6.5 14 C 8.3 14.8 8.3 20.2 6.5 21 C 4.7 20.2 4.7 14.8 6.5 14 Z"/>
                    <path d="M 12 11.5 C 14.5 12.5 14.5 20 12 21 C 9.5 20 9.5 12.5 12 11.5 Z"/>
                    <path d="M 17.5 9 C 20.7 10.2 20.7 19.8 17.5 21 C 14.3 19.8 14.3 10.2 17.5 9 Z"/>
                </svg>
            </div>
            <span class="logo-name">Sprout</span>
        </div>

        <h1>Welcome back 👋</h1>
        <p class="sub">Sign in to access your spending data from any device.</p>

        <div id="errMsg" class="err-msg"></div>

        <!-- Google Sign-In (shown when Firebase is configured) -->
        <div id="googleSection">
            <button class="btn-google" onclick="signInGoogle()">
                <svg width="20" height="20" viewBox="0 0 48 48">
                    <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
                    <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
                    <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
                    <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
                    <path fill="none" d="M0 0h48v48H0z"/>
                </svg>
                Continue with Google
            </button>
        </div>

        <!-- Legacy name/email (shown when Firebase is NOT configured) -->
        <div id="legacySection" style="display:none">
            <div class="field-wrap">
                <label for="signupName">Your Name</label>
                <input type="text" id="signupName" placeholder="e.g. Alex Chen" autocomplete="name" />
                <p class="err" id="errName">Please enter your name</p>
            </div>
            <div class="field-wrap">
                <label for="signupEmail">Email Address</label>
                <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email" />
                <p class="err" id="errEmail">Please enter a valid email</p>
            </div>
            <button class="btn-start" onclick="legacySignUp()">Start Growing →</button>
        </div>

        <p class="footer-link">Already set up? <a href="app.html">Open App</a></p>
        <p class="privacy">🔒 Your data is private and only accessible with your account.</p>
    </div>

    <script src="js/firebase-config.js"></script>
    <script>
        function _appUrl() {
            const p = new URLSearchParams(window.location.search).get('joinTrip');
            return 'app.html' + (p ? '?joinTrip=' + encodeURIComponent(p) : '');
        }

        (function init() {
            if (FIREBASE_ENABLED && typeof firebase !== 'undefined' && firebase.apps?.length) {
                // Firebase configured — show Google button, hide legacy form
                document.getElementById('googleSection').style.display = '';
                document.getElementById('legacySection').style.display = 'none';

                // If already signed in, go straight to app
                firebase.auth().onAuthStateChanged(user => {
                    if (user) window.location.href = _appUrl();
                });
            } else {
                // Firebase not yet configured — use legacy name/email
                document.getElementById('googleSection').style.display = 'none';
                document.getElementById('legacySection').style.display = '';

                // If already "logged in" via localStorage, go to app
                try {
                    if (JSON.parse(localStorage.getItem('sprout_user') || 'null')) {
                        window.location.href = _appUrl();
                    }
                } catch(e) {}

                document.addEventListener('keydown', e => { if (e.key === 'Enter') legacySignUp(); });
                setTimeout(() => { const n = document.getElementById('signupName'); if (n) n.focus(); }, 100);
            }
        })();

        function signInGoogle() {
            const btn = document.querySelector('.btn-google');
            btn.disabled = true;
            btn.textContent = 'Signing in…';

            const provider = new firebase.auth.GoogleAuthProvider();
            firebase.auth().signInWithPopup(provider)
                .then(() => { window.location.href = _appUrl(); })
                .catch(err => {
                    const el = document.getElementById('errMsg');
                    el.textContent = err.code === 'auth/popup-closed-by-user'
                        ? 'Sign-in cancelled — please try again.'
                        : err.message;
                    el.style.display = 'block';
                    btn.disabled = false;
                    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg> Continue with Google`;
                });
        }

        function legacySignUp() {
            const name  = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            let ok = true;
            document.getElementById('errName').style.display  = name  ? 'none' : (ok=false,'block');
            document.getElementById('errEmail').style.display = (email && email.includes('@')) ? 'none' : (ok=false,'block');
            if (!ok) return;
            const uid = (crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).slice(2));
            localStorage.setItem('sprout_user', JSON.stringify({ name, email, uid, createdAt: new Date().toISOString() }));
            window.location.href = _appUrl();
        }
    </script>
</body>
</html>
