<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprout — Create Account</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="apple-touch-icon" href="sprout-logo.png">
    <meta name="theme-color" content="#052e16">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body {
            font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
            background: linear-gradient(160deg, #052e16 0%, #14532d 60%, #166534 100%);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 28px;
            padding: 40px 36px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 80px rgba(0,0,0,0.28);
        }
        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(145deg, #22c55e, #15803d);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 12px rgba(22,163,74,0.4);
        }
        .logo-name { font-size: 20px; font-weight: 800; color: #052e16; }
        h1 { font-size: 26px; font-weight: 800; color: #052e16; letter-spacing: -0.6px; margin-bottom: 6px; }
        .sub { font-size: 14px; color: #6b7280; margin-bottom: 28px; line-height: 1.5; }
        label {
            display: block;
            font-size: 11px; font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.5px;
            color: #166534; margin-bottom: 6px;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 13px 16px;
            border: 1.5px solid #bbf7d0;
            border-radius: 12px;
            font-size: 15px; font-family: inherit;
            color: #052e16; background: #f0fdf4;
            margin-bottom: 6px; outline: none;
            transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
        }
        input:focus {
            border-color: #16a34a;
            background: white;
            box-shadow: 0 0 0 3px rgba(22,163,74,0.14);
        }
        .field-wrap { margin-bottom: 18px; }
        .err {
            font-size: 12px; color: #ef4444; font-weight: 500;
            margin-top: 2px; display: none;
        }
        .btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #16a34a, #0d9488);
            color: white; border: none; border-radius: 14px;
            font-size: 16px; font-weight: 800;
            cursor: pointer; font-family: inherit;
            box-shadow: 0 6px 20px rgba(22,163,74,0.4);
            margin-bottom: 20px;
            transition: opacity 0.15s, transform 0.1s;
            letter-spacing: -0.2px;
        }
        .btn:hover { opacity: 0.93; }
        .btn:active { transform: scale(0.97); }
        .footer-link { text-align: center; font-size: 13px; color: #6b7280; }
        .footer-link a { color: #16a34a; font-weight: 700; text-decoration: none; }
        .privacy { text-align: center; font-size: 11px; color: #9ca3af; margin-top: 16px; line-height: 1.5; }
        @media (max-width: 440px) {
            .card { padding: 32px 22px 28px; border-radius: 24px; }
            h1 { font-size: 23px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-row">
            <div class="logo-icon">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="white">
                    <path d="M 2.5 12 C 6 1 18 1 22 9 L 20.5 10.5 C 17 3.5 7 3.5 4 13 Z"/>
                    <path d="M 6.5 14 C 8.3 14.8 8.3 20.2 6.5 21 C 4.7 20.2 4.7 14.8 6.5 14 Z"/>
                    <path d="M 12 11.5 C 14.5 12.5 14.5 20 12 21 C 9.5 20 9.5 12.5 12 11.5 Z"/>
                    <path d="M 17.5 9 C 20.7 10.2 20.7 19.8 17.5 21 C 14.3 19.8 14.3 10.2 17.5 9 Z"/>
                </svg>
            </div>
            <span class="logo-name">Sprout</span>
        </div>

        <h1>Create your account</h1>
        <p class="sub">Track spending in seconds. Free forever — your data stays on your device.</p>

        <div class="field-wrap">
            <label for="signupName">Your Name</label>
            <input type="text" id="signupName" placeholder="e.g. Alex Chen" autocomplete="name" />
            <p class="err" id="errName">Please enter your name</p>
        </div>

        <div class="field-wrap">
            <label for="signupEmail">Email Address</label>
            <input type="email" id="signupEmail" placeholder="you@example.com" autocomplete="email" />
            <p class="err" id="errEmail">Please enter a valid email</p>
        </div>

        <button class="btn" onclick="handleSignUp()">Start Growing →</button>

        <p class="footer-link">Already set up? <a href="app.html">Open App</a></p>
        <p class="privacy">🔒 Nothing leaves your browser. No servers, no tracking.</p>
    </div>

    <script>
        try { if (localStorage.getItem('sprout_user')) window.location.href = 'app.html'; } catch(e) {}

        function handleSignUp() {
            const name  = document.getElementById('signupName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            let ok = true;
            document.getElementById('errName').style.display  = name  ? 'none' : (ok=false, 'block');
            document.getElementById('errEmail').style.display = (email && email.includes('@')) ? 'none' : (ok=false, 'block');
            if (!ok) return;
            localStorage.setItem('sprout_user', JSON.stringify({ name, email, createdAt: new Date().toISOString() }));
            window.location.href = 'app.html';
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignUp(); });
        document.getElementById('signupName').focus();
    </script>
</body>
</html>
